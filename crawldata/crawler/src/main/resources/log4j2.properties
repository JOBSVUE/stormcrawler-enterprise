status = error
name = PropertiesConfig

# Root logger level
rootLogger.level = INFO
rootLogger.appenderRefs = stdout
rootLogger.appenderRef.stdout.ref = STDOUT

# Console appender configuration
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# StormCrawler logger levels
logger.stormcrawler.name = com.digitalpebble.stormcrawler
logger.stormcrawler.level = DEBUG

# Storm loggers
logger.storm.name = org.apache.storm
logger.storm.level = INFO

# Elasticsearch loggers
logger.es.name = org.elasticsearch
logger.es.level = INFO

# Our custom loggers
logger.simpleoraclespout.name = com.digitalpebble.SimpleOracleSpout
logger.simpleoraclespout.level = DEBUG

logger.sqlstatusupdater.name = com.digitalpebble.SQLStatusUpdaterBolt
logger.sqlstatusupdater.level = DEBUG

logger.debugbolt.name = com.digitalpebble.DebugBolt
logger.debugbolt.level = DEBUG

# Disable HikariCP logging entirely since we're not using it
logger.hikaricp.name = com.zaxxer.hikari
logger.hikaricp.level = OFF
